services:
  muco-api:
    image: muco-api:latest
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      MUCO_DEVICE: "0"
      JOB_ROOT: /data/muco/jobs
      LOG_ROOT: /data/muco/logs
      TORCH_HOME: /opt/torch-cache
      NVIDIA_VISIBLE_DEVICES: "0"
    volumes:
      - ./params:/srv/muco/params:ro
      - ./runs/jobs:/data/muco/jobs
      - ./runs/logs:/data/muco/logs
      - ./torch-cache:/opt/torch-cache
    ports:
      - "8000:8000"
    gpus: all

  web:
    build:
      context: ./app
      dockerfile: Dockerfile.web
    environment:
      MUCO_API_URL: http://muco-api:8000
    ports:
      - "3000:3000"
    depends_on:
      - muco-api
